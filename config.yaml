# Milwaukee Data Tracker — config
#
# DPI publishes one ZIP file per school year, per topic, at predictable URLs:
#   https://dpi.wi.gov/sites/default/files/wise/downloads/<prefix>_<year>.zip
# So instead of you hunting down URLs by hand, fetch_dpi.py builds them from the
# `years` list below and downloads/unzips each one automatically.
#
# Confirmed working prefixes (checked against DPI's live file listing):
#   enrollment_certified           -> enrollment, by student group
#   absenteeism_certified          -> chronic absenteeism specifically
#   discipline_actions_certified   -> suspensions/expulsions (the "actions" file,
#                                      not discipline_incidents, which is a different dataset)
#
# If you add a new source, check the real filename first at:
#   https://dpi.wi.gov/wisedash/public/download-files
# (search-in-page for the topic, hover the file link, confirm the exact prefix)

district_filter: "Milwaukee"   # matches DISTRICT_NAME containing this text (catches MPS)
flag_threshold_pct: 5          # flag any year-over-year change of this % or more

# Years to pull. DPI's discipline_actions files only go back to 2016-17 in this
# naming scheme (older years use a different combined "discipline_certified" file
# with a different structure) — stick to 2016-17 or later here unless you're
# ready to handle that older format separately.
years:
  - "2018-19"
  - "2019-20"
  - "2020-21"
  - "2021-22"
  - "2022-23"
  - "2023-24"
  - "2024-25"
  # 2025-26 enrollment exists already; absenteeism/discipline for 2025-26 won't
  # be certified until partway through the school year. Add it once it's out.

sources:
  enrollment:
    url_prefix: "enrollment_certified"
    metric_type: "count"          # count = raw number (sum across rows), rate = percentage (average)
    year_col: "SCHOOL_YEAR"
    district_col: "DISTRICT_NAME"
    school_col: "SCHOOL_NAME"
    group_col: "GROUP_BY"
    group_value_col: "GROUP_BY_VALUE"
    value_col: "STUDENT_COUNT"

  chronic_absenteeism:
    url_prefix: "absenteeism_certified"
    metric_type: "rate"
    year_col: "SCHOOL_YEAR"
    district_col: "DISTRICT_NAME"
    school_col: "SCHOOL_NAME"
    group_col: "GROUP_BY"
    group_value_col: "GROUP_BY_VALUE"
    value_col: "PERCENT_CHRONIC_ABSENTEEISM"

  discipline:
    url_prefix: "discipline_actions_certified"
    metric_type: "count"
    year_col: "SCHOOL_YEAR"
    district_col: "DISTRICT_NAME"
    school_col: "SCHOOL_NAME"
    group_col: "GROUP_BY"
    group_value_col: "GROUP_BY_VALUE"
    value_col: "STUDENT_COUNT"

# NOTE: DPI's exact column names vary a bit by topic/year. If analyze.py errors
# out or reports "no rows matched", run:
#     python inspect_csv.py data/raw/enrollment_raw.csv
# and update the *_col values above to match what's actually in the file.
