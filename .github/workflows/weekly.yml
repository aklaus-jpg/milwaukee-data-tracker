name: Weekly Milwaukee Data Pull

on:
  schedule:
    - cron: "0 13 * * 1"   # Mondays ~8am Central (adjust if DST matters to you)
  workflow_dispatch: {}     # lets you trigger a run manually from the Actions tab

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        run: python run_pipeline.py

      - name: Commit updated data, charts, and summary
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-update Milwaukee data (run ${{ github.run_number }})"
          file_pattern: "data/** charts/** SUMMARY.md"
